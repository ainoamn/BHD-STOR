# =============================================================================
# BHD Oman Marketplace - Docker Compose (Production)
# Optimized builds, SSL, monitoring, backups
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Primary
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: bhd-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Muscat
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis (Production with persistence)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bhd-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --protected-mode yes
    environment:
      TZ: Asia/Muscat
    volumes:
      - redis-prod-data:/data
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "-a", "${REDIS_PASSWORD}", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: bhd-elasticsearch-prod
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
      - TZ=Asia/Muscat
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-prod-data:/usr/share/elasticsearch/data
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Backend API (Production)
  # ---------------------------------------------------------------------------
  app:
    image: ${DOCKER_REGISTRY:-bhdoman}/bhd-backend:${BACKEND_TAG:-latest}
    container_name: bhd-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      API_PREFIX: /api/v1
      API_URL: https://${DOMAIN}/api/v1
      FRONTEND_URL: https://${DOMAIN}
      CORS_ORIGIN: https://${DOMAIN}
      UPLOAD_DIR: /app/uploads
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      OMANNET_MERCHANT_ID: ${OMANNET_MERCHANT_ID}
      OMANNET_API_KEY: ${OMANNET_API_KEY}
      THAWANI_API_KEY: ${THAWANI_API_KEY}
      THAWANI_PUBLISHABLE_KEY: ${THAWANI_PUBLISHABLE_KEY}
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 100
      TZ: Asia/Muscat
    volumes:
      - uploads-prod:/app/uploads
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Frontend (Production)
  # ---------------------------------------------------------------------------
  web:
    image: ${DOCKER_REGISTRY:-bhdoman}/bhd-frontend:${FRONTEND_TAG:-latest}
    container_name: bhd-frontend-prod
    restart: always
    depends_on:
      app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
      NEXT_PUBLIC_DEFAULT_LOCALE: ar
      NEXT_PUBLIC_CURRENCY: OMR
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (Production)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: bhd-nginx-prod
    restart: always
    depends_on:
      web:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads-prod:/var/www/uploads:ro
      - nginx-logs-prod:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - bhd-prod-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Certbot for SSL
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: bhd-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot-data:/var/lib/letsencrypt
      - uploads-prod:/var/www/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - bhd-prod-network

  # ---------------------------------------------------------------------------
  # Prometheus (Monitoring)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: bhd-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - bhd-prod-network

  # ---------------------------------------------------------------------------
  # Grafana (Dashboards)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: bhd-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - bhd-prod-network
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Loki (Log Aggregation)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: bhd-loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - bhd-prod-network

  # ---------------------------------------------------------------------------
  # Promtail (Log Shipper)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: bhd-promtail
    restart: always
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - nginx-logs-prod:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - bhd-prod-network
    depends_on:
      - loki

  # ---------------------------------------------------------------------------
  # Database Backup Service
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: bhd-backup
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
      BACKUP_DIR: /backups
      RETENTION_DAYS: 7
    volumes:
      - ./backups/postgres:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: >
      sh -c "
        echo '0 2 * * * /backup.sh' | crontab - &&
        crond -f -l 2
      "
    networks:
      - bhd-prod-network
    depends_on:
      db:
        condition: service_healthy

networks:
  bhd-prod-network:
    driver: overlay
    attachable: true

volumes:
  postgres-prod-data:
  redis-prod-data:
  elasticsearch-prod-data:
  uploads-prod:
  nginx-logs-prod:
  prometheus-data:
  grafana-data:
  loki-data:
