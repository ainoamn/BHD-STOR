# =============================================================================
# BHD Oman Marketplace - Continuous Deployment
# Manual deploy only (no auto-deploy on push to main until secrets/staging ready)
# =============================================================================

name: CD

on:
  # Disabled automatic deploy on every main push — use "Run workflow" instead.
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
          - rollback
      version:
        description: "Version/tag to deploy (e.g. v1.2.3 or leave empty for date-run)"
        required: false
        type: string
      restore_database:
        description: "On rollback only: also restore latest DB backup (DANGEROUS)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'bhdoman' }}
  BACKEND_IMAGE: bhd-backend
  FRONTEND_IMAGE: bhd-frontend

jobs:
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'production'
    environment: ${{ github.event.inputs.environment }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION ($SHA_TAG)"

      - name: Generate metadata
        id: meta
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_TAG="${{ steps.version.outputs.sha_tag }}"
          echo "backend_tag=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:$VERSION" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:$VERSION" >> "$GITHUB_OUTPUT"
          echo "backend_sha=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_sha=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.APP_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.APP_NAME }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.bhdoman.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add host to known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          VERSION: ${{ needs.build-images.outputs.version }}
        run: |
          ssh "$USER@$HOST" << EOF
            set -euo pipefail
            cd /opt/bhd-marketplace

            git fetch origin
            git checkout main
            git pull origin main

            touch .env
            if grep -q '^BACKEND_TAG=' .env; then
              sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$VERSION/" .env
            else
              echo "BACKEND_TAG=$VERSION" >> .env
            fi
            if grep -q '^FRONTEND_TAG=' .env; then
              sed -i "s/^FRONTEND_TAG=.*/FRONTEND_TAG=$VERSION/" .env
            else
              echo "FRONTEND_TAG=$VERSION" >> .env
            fi

            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            docker-compose -f docker-compose.prod.yml exec -T app npm run migration:run

            sleep 10
            curl -f http://localhost:3001/api/v1/health || exit 1
            echo "Staging deployment successful! tag=$VERSION"
          EOF

      - name: Run smoke tests
        run: |
          sleep 15
          curl -sf https://staging.bhdoman.com/api/v1/health || exit 1
          curl -sf https://staging.bhdoman.com || exit 1
          echo "Smoke tests passed!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images]
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://bhdoman.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add host to known hosts
        run: ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment backup (images + DB dump only)
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          VERSION: ${{ needs.build-images.outputs.version }}
        run: |
          ssh "$USER@$HOST" << EOF
            set -euo pipefail
            cd /opt/bhd-marketplace
            mkdir -p backups
            # Remember previous pinned tags for app-only rollback
            PREV_BACKEND=\$(grep '^BACKEND_TAG=' .env | cut -d= -f2- || true)
            PREV_FRONTEND=\$(grep '^FRONTEND_TAG=' .env | cut -d= -f2- || true)
            echo "PREV_BACKEND_TAG=\$PREV_BACKEND" > .rollback-tags
            echo "PREV_FRONTEND_TAG=\$PREV_FRONTEND" >> .rollback-tags
            docker-compose -f docker-compose.prod.yml exec -T db pg_dump -U ${{ secrets.DB_USER }} ${{ secrets.DB_NAME }} > "backups/pre-deploy-\$(date +%Y%m%d-%H%M%S).sql"
          EOF

      - name: Deploy to production server
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          VERSION: ${{ needs.build-images.outputs.version }}
        run: |
          ssh "$USER@$HOST" << EOF
            set -euo pipefail
            cd /opt/bhd-marketplace

            git fetch origin
            git checkout main
            git pull origin main

            touch .env
            if grep -q '^BACKEND_TAG=' .env; then
              sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$VERSION/" .env
            else
              echo "BACKEND_TAG=$VERSION" >> .env
            fi
            if grep -q '^FRONTEND_TAG=' .env; then
              sed -i "s/^FRONTEND_TAG=.*/FRONTEND_TAG=$VERSION/" .env
            else
              echo "FRONTEND_TAG=$VERSION" >> .env
            fi

            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            docker-compose -f docker-compose.prod.yml exec -T app npm run migration:run
            docker image prune -af --filter "until=168h" || true

            echo "Production deployment successful! tag=$VERSION"
          EOF

      - name: Run production smoke tests
        run: |
          sleep 20
          curl -sf https://bhdoman.com/api/v1/health || exit 1
          curl -sf https://bhdoman.com || exit 1
          echo "Production smoke tests passed!"

  rollback:
    name: Rollback Production (app images only by default)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.environment == 'rollback'
    environment: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add host to known hosts
        run: ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback application tags
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          RESTORE_DB: ${{ github.event.inputs.restore_database }}
        run: |
          ssh "$USER@$HOST" << EOF
            set -euo pipefail
            cd /opt/bhd-marketplace

            if [ ! -f .rollback-tags ]; then
              echo "No .rollback-tags file — cannot safely roll back."
              exit 1
            fi

            PREV_BACKEND=\$(grep '^PREV_BACKEND_TAG=' .rollback-tags | cut -d= -f2-)
            PREV_FRONTEND=\$(grep '^PREV_FRONTEND_TAG=' .rollback-tags | cut -d= -f2-)

            if [ -z "\$PREV_BACKEND" ] || [ -z "\$PREV_FRONTEND" ]; then
              echo "Previous tags empty — aborting."
              exit 1
            fi

            touch .env
            sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=\$PREV_BACKEND/" .env || echo "BACKEND_TAG=\$PREV_BACKEND" >> .env
            sed -i "s/^FRONTEND_TAG=.*/FRONTEND_TAG=\$PREV_FRONTEND/" .env || echo "FRONTEND_TAG=\$PREV_FRONTEND" >> .env

            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d app web

            if [ "$RESTORE_DB" = "true" ]; then
              echo "WARNING: restoring latest DB backup (data after backup will be lost)"
              LATEST_BACKUP=\$(ls -t backups/*.sql 2>/dev/null | head -1 || true)
              if [ -n "\$LATEST_BACKUP" ] && [ -f "\$LATEST_BACKUP" ]; then
                docker-compose -f docker-compose.prod.yml exec -T db psql -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} < "\$LATEST_BACKUP"
              else
                echo "No backup file found — app rolled back without DB restore"
              fi
            else
              echo "DB restore skipped (default). App images rolled back only."
            fi

            echo "Rollback completed to BACKEND=\$PREV_BACKEND FRONTEND=\$PREV_FRONTEND"
          EOF
