# =============================================================================
# BHD Oman Marketplace - Docker Image Build & Publish
# Builds multi-platform images and pushes to registry
# =============================================================================

name: Docker Build & Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: true
        default: "latest"
      push:
        description: "Push to registry"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
  REGISTRY_URL: ${{ secrets.DOCKER_REGISTRY_URL }}

jobs:
  # =========================================================================
  # JOB: Build Backend Image
  # =========================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bhd-backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            NODE_VERSION=18-alpine

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/bhd-backend:${{ github.event.inputs.tag || 'latest' }}
          format: "sarif"
          output: "trivy-backend-results.sarif"
        continue-on-error: true

  # =========================================================================
  # JOB: Build Frontend Image
  # =========================================================================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bhd-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NODE_VERSION=18-alpine
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.APP_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.APP_NAME || 'BHD Marketplace' }}
            NEXT_PUBLIC_DEFAULT_LOCALE=ar
            NEXT_PUBLIC_CURRENCY=OMR

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/bhd-frontend:${{ github.event.inputs.tag || 'latest' }}
          format: "sarif"
          output: "trivy-frontend-results.sarif"
        continue-on-error: true

  # =========================================================================
  # JOB: Update Compose on Server
  # =========================================================================
  update-server:
    name: Update Server Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-backend, build-frontend]
    if: github.event.inputs.push != 'false' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Update docker-compose on server
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          TAG: ${{ github.ref_name }}
        run: |
          ssh $USER@$HOST << EOF
            cd /opt/bhd-marketplace
            
            # Update image tags in compose
            sed -i "s|bhd-backend:.*|bhd-backend:$TAG|g" docker-compose.prod.yml
            sed -i "s|bhd-frontend:.*|bhd-frontend:$TAG|g" docker-compose.prod.yml
            
            echo "Updated to version $TAG"
          EOF

  # =========================================================================
  # JOB: Create GitHub Release
  # =========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Docker Images" >> $GITHUB_OUTPUT
          echo "- Backend: \`${{ env.REGISTRY }}/bhd-backend:${{ github.ref_name }}\`" >> $GITHUB_OUTPUT
          echo "- Frontend: \`${{ env.REGISTRY }}/bhd-frontend:${{ github.ref_name }}\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Platforms" >> $GITHUB_OUTPUT
          echo "- linux/amd64" >> $GITHUB_OUTPUT
          echo "- linux/arm64" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Changelog" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~1)..HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
