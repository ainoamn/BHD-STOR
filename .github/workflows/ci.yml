# =============================================================================
# BHD-STOR — Continuous Integration (pragmatic)
# Build-first gates; heavy lint/e2e kept non-blocking until suites stabilize.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build-backend:
    name: Backend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: ./backend
        run: npm ci
      - name: Build (SWC)
        working-directory: ./backend
        run: npm run build

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: ./frontend
        run: npm ci
      - name: Build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_DEMO_MODE: "false"
        run: npm run build

  typecheck-frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: ./frontend
        run: npm ci
      - name: tsc
        working-directory: ./frontend
        run: npx tsc --noEmit

  unit-tests:
    name: Unit tests (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install
        working-directory: ./${{ matrix.service }}
        run: npm ci
      - name: Test
        working-directory: ./${{ matrix.service }}
        run: npm test -- --passWithNoTests --coverage=false
        continue-on-error: true

  security-audit:
    name: npm audit (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Backend audit
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Frontend audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true
