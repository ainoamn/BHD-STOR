# =============================================================================
# BHD-STOR — local infrastructure only (Postgres + Redis)
# No Docker Desktop app images — use when developing Nest/Next on the host.
#
#   docker compose -f docker-compose.infra.yml up -d
#   setup-env.bat
#   cd backend && npm run migration:run && npm run seed && npm run start:dev
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: bhd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bhd_marketplace}
      TZ: Asia/Muscat
    ports:
      - "5432:5432"
    volumes:
      - bhd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-bhd_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bhd-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - bhd-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bhd-postgres-data:
  bhd-redis-data:
