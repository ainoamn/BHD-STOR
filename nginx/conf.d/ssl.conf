# =============================================================================
# BHD Oman Marketplace - SSL/TLS Configuration
# Advanced SSL settings for production security
# =============================================================================

# ---------------------------------------------------------------------------
# SSL Certificate Paths (to be updated by Certbot)
# ---------------------------------------------------------------------------
# Primary domain
ssl_certificate /etc/nginx/ssl/live/bhdoman.com/fullchain.pem;
ssl_certificate_key /etc/nginx/ssl/live/bhdoman.com/privkey.pem;
ssl_trusted_certificate /etc/nginx/ssl/live/bhdoman.com/chain.pem;

# ---------------------------------------------------------------------------
# TLS PROTOCOLS
# Only allow modern TLS versions
# ---------------------------------------------------------------------------
ssl_protocols TLSv1.2 TLSv1.3;

# Prefer server ciphers
ssl_prefer_server_ciphers on;

# ---------------------------------------------------------------------------
# CIPHER SUITES
# Strong, modern cipher suites only
# ---------------------------------------------------------------------------
ssl_ciphers
    "ECDHE-ECDSA-AES128-GCM-SHA256:
     ECDHE-RSA-AES128-GCM-SHA256:
     ECDHE-ECDSA-AES256-GCM-SHA384:
     ECDHE-RSA-AES256-GCM-SHA384:
     ECDHE-ECDSA-CHACHA20-POLY1305:
     ECDHE-RSA-CHACHA20-POLY1305:
     DHE-RSA-AES128-GCM-SHA256:
     DHE-RSA-AES256-GCM-SHA384";

# ---------------------------------------------------------------------------
# SSL SESSION
# ---------------------------------------------------------------------------
# Session cache
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Ticket key rotation (for multi-server setups)
# ssl_session_ticket_key /etc/nginx/ssl/ticket.key;

# ---------------------------------------------------------------------------
# OCSP STAPLING
# Improves SSL handshake performance
# ---------------------------------------------------------------------------
ssl_stapling on;
ssl_stapling_verify on;

# DNS resolver for OCSP
resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
resolver_timeout 5s;

# ---------------------------------------------------------------------------
# HSTS (HTTP Strict Transport Security)
# Forces HTTPS for the specified duration
# ---------------------------------------------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ---------------------------------------------------------------------------
# DIFFIE-HELLMAN PARAMETERS
# For DHE cipher suites
# ---------------------------------------------------------------------------
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ---------------------------------------------------------------------------
# ELLIPTIC CURVE
# ---------------------------------------------------------------------------
ssl_ecdh_curve secp384r1:X25519:prime256v1;

# ---------------------------------------------------------------------------
# BROWSER COMPATIBILITY
# ---------------------------------------------------------------------------
# Modern browsers (TLS 1.3): Chrome 70+, Firefox 63+, Safari 12.1+, Edge 75+
# TLS 1.2 support: Chrome 30+, Firefox 27+, Safari 7+, Edge 12+, IE 11+

# ---------------------------------------------------------------------------
# CERTIFICATE MONITORING
# ---------------------------------------------------------------------------
# SSL certificate expiry monitoring endpoint
location ~ ^/\.well-known/ssl-expiry$ {
    access_log off;
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    deny all;

    content_by_lua_block {
        local ssl = require "ngx.ssl"
        local chain = ssl.parse_pem_cert(io.open("/etc/nginx/ssl/live/bhdoman.com/fullchain.pem", "r"):read("*a"))
        local expiry = chain:ocsp_responder()
        ngx.say("{\"expiry\":\"" .. expiry .. "\"}")
    }
}
