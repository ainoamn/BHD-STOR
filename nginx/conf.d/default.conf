# =============================================================================
# BHD Oman Marketplace - Default Server Configuration
# Handles HTTP/HTTPS traffic, API proxying, WebSocket, and static files
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP Server - Redirect to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (accessible without SSL for load balancers)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS Server - Main Application
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/live/bhdoman.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/bhdoman.com/privkey.pem;
    ssl_trusted_certificate /etc/nginx/ssl/live/bhdoman.com/chain.pem;

    # Root and index
    root /var/www/html;
    index index.html;

    # -----------------------------------------------------------------------
    # SECURITY HEADERS
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.bhdoman.com wss: https:; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # -----------------------------------------------------------------------
    # LOGGING
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/bhd-access.log main buffer=16k;
    error_log /var/log/nginx/bhd-error.log warn;

    # -----------------------------------------------------------------------
    # STATIC FILES - Uploads
    # -----------------------------------------------------------------------
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # Security: only serve image and document types
        location ~* \.(jpg|jpeg|png|gif|webp|svg|pdf|doc|docx)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to other file types
        location ~* \.(php|py|sh|env|git|sql)$ {
            deny all;
            return 403;
        }
    }

    # -----------------------------------------------------------------------
    # API ENDPOINTS - Proxy to NestJS Backend
    # -----------------------------------------------------------------------
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        # Proxy to backend
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # CORS headers (if not handled by backend)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # -----------------------------------------------------------------------
    # AUTH ENDPOINTS - Stricter rate limiting
    # -----------------------------------------------------------------------
    location ~ ^/api/(v\d+/)?auth/(login|register|forgot-password|reset-password)$ {
        # Stricter rate limit for auth
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # UPLOAD ENDPOINTS - Special handling
    # -----------------------------------------------------------------------
    location ~ ^/api/(v\d+/)?(upload|files|media)/ {
        # Upload rate limit
        limit_req zone=upload_limit burst=10 nodelay;

        # Increase body size for uploads
        client_max_body_size 10M;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for large uploads
        proxy_request_buffering on;
        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # WEBSOCKET ENDPOINTS - Real-time features
    # -----------------------------------------------------------------------
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # NEXT.JS INTERNAL ENDPOINTS
    # -----------------------------------------------------------------------
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache static assets
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------------
    # NEXT.JS STATIC FILES
    # -----------------------------------------------------------------------
    location /static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public";
    }

    # -----------------------------------------------------------------------
    # FAVICON AND ROBOTS
    # -----------------------------------------------------------------------
    location = /favicon.ico {
        proxy_pass http://frontend;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://frontend;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://frontend;
        expires 1d;
        add_header Cache-Control "public";
    }

    # -----------------------------------------------------------------------
    # MAIN APPLICATION - Proxy to Next.js Frontend
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Enable compression between nginx and frontend
        proxy_set_header Accept-Encoding "";
    }

    # -----------------------------------------------------------------------
    # ERROR PAGES
    # -----------------------------------------------------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ---------------------------------------------------------------------------
# Monitoring Server Block (Grafana access)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name grafana.*;

    ssl_certificate /etc/nginx/ssl/live/bhdoman.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/bhdoman.com/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
