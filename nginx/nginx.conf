# =============================================================================
# BHD Oman Marketplace - Main Nginx Configuration
# Production-ready with performance and security optimizations
# =============================================================================

# Run nginx as non-root user
user nginx;

# Auto-detect worker processes based on CPU cores
worker_processes auto;

# PID file location
pid /var/run/nginx.pid;

# Error log level
error_log /var/log/nginx/error.log warn;

# Load dynamic modules
load_module modules/ngx_http_geoip2_module.so;

# ---------------------------------------------------------------------------
# EVENTS BLOCK
# ---------------------------------------------------------------------------
events {
    # Use epoll on Linux for efficient connection handling
    use epoll;

    # Maximum connections per worker
    worker_connections 4096;

    # Accept multiple connections at once
    multi_accept on;
}

# ---------------------------------------------------------------------------
# HTTP BLOCK
# ---------------------------------------------------------------------------
http {
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -----------------------------------------------------------------------
    # LOG FORMAT
    # -----------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=16k;

    # -----------------------------------------------------------------------
    # PERFORMANCE TUNING
    # -----------------------------------------------------------------------

    # Enable sendfile for efficient file transfers
    sendfile on;

    # TCP optimizations
    tcp_nopush on;
    tcp_nodelay on;

    # Connection keepalive
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Types hash max size
    types_hash_max_size 2048;

    # Client body size limit (10MB for uploads)
    client_max_body_size 10M;

    # Client header buffer
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # -----------------------------------------------------------------------
    # GZIP COMPRESSION
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Disable gzip for IE6
    gzip_disable "msie6";

    # -----------------------------------------------------------------------
    # BROTLI COMPRESSION (if module available)
    # -----------------------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json;

    # -----------------------------------------------------------------------
    # RATE LIMITING ZONES
    # -----------------------------------------------------------------------
    # General API rate limit: 100 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Auth endpoints: 10 requests/minute per IP (login, register)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Strict limit for password reset: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=password_limit:10m rate=5r/m;

    # Upload limit: 20 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -----------------------------------------------------------------------
    # SECURITY HEADERS (applied globally, can be overridden per server)
    # -----------------------------------------------------------------------
    # These are also set in the server block for redundancy
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------------------------
    # SSL SETTINGS (global defaults)
    # -----------------------------------------------------------------------
    # SSL session caching
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Strong cipher suites
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # -----------------------------------------------------------------------
    # UPSTREAM SERVERS
    # -----------------------------------------------------------------------
    # Next.js Frontend
    upstream frontend {
        least_conn;
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # NestJS Backend API
    upstream backend {
        least_conn;
        server app:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # INCLUDE SERVER CONFIGS
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
